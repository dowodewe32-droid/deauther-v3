name: Build GMpro87dev Firmware

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Clean disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /root/.platformio
          df -h
          
      - name: Clone TESA base and Build
        run: |
          cd /tmp
          rm -rf ESP32-Deauther
          git clone --depth 1 https://github.com/tesa-klebeband/ESP32-Deauther
          
          cp -r /home/runner/work/deauther-v3/deauther-v3/data/web /tmp/ESP32-Deauther/data/
          cp /home/runner/work/deauther-v3/deauther-v3/src/*.h /tmp/ESP32-Deauther/src/
          cp /home/runner/work/deauther-v3/deauther-v3/src/*.cpp /tmp/ESP32-Deauther/src/
          cp /home/runner/work/deauther-v3/deauther-v3/src/*.ino /tmp/ESP32-Deauther/src/
          
          pip install --no-cache-dir platformio
          
          cd /tmp/ESP32-Deauther
          pio run -e esp32doit-devkit-v1 2>&1 | tee /tmp/build.log
          
      - name: Check result
        id: result
        run: |
          if [ -f "/tmp/ESP32-Deauther/.pio/build/esp32doit-devkit-v1/firmware.bin" ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
            ls -la /tmp/ESP32-Deauther/.pio/build/esp32doit-devkit-v1/*.bin
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
            cat /tmp/build.log | tail -30
          fi
          
      - name: Create flash image
        if: success()
        run: |
          cd /tmp/ESP32-Deauther
          
          python3 << 'PYEOF'
          import os
          BOOTLOADER_ADDR = 0x1000
          PARTITIONS_ADDR = 0x8000
          APP_ADDR = 0x10000
          
          with open('.pio/build/esp32doit-devkit-v1/bootloader.bin', 'rb') as f:
              bootloader = f.read()
          with open('.pio/build/esp32doit-devkit-v1/partitions.bin', 'rb') as f:
              partitions = f.read()
          with open('.pio/build/esp32doit-devkit-v1/firmware.bin', 'rb') as f:
              firmware = f.read()
          
          with open('GMpro87dev_complete_flash.bin', 'wb') as f:
              f.write(b'\xff' * BOOTLOADER_ADDR)
              f.write(bootloader)
              f.write(b'\xff' * (PARTITIONS_ADDR - (BOOTLOADER_ADDR + len(bootloader))))
              f.write(partitions)
              f.write(b'\xff' * (APP_ADDR - (PARTITIONS_ADDR + len(partitions))))
              f.write(firmware)
          
          print(f"Complete flash: {os.path.getsize('GMpro87dev_complete_flash.bin')} bytes")
          PYEOF
          
      - name: Upload
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/ESP32-Deauther
          
          RESP=$(curl -s -X POST \
            "https://uploads.github.com/repos/dowodewe32-droid/deauther-v3/releases/308016127/assets?name=GMpro87dev_v1.0_complete_flash.bin" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @GMpro87dev_complete_flash.bin)
          
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('URL:', d.get('browser_download_url', d.get('message','ERROR')))"