name: Build Custom Firmware

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-esp32:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Debug - List workspace
        run: |
          echo "=== Workspace Contents ==="
          ls -la /home/runner/work/deauther-v3/deauther-v3/
          echo ""
          echo "=== Data Directory ==="
          ls -la /home/runner/work/deauther-v3/deauther-v3/data/web/ 2>/dev/null || echo "No web dir"
          echo ""
          echo "=== Disk Space ==="
          df -h
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Clean disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          echo "=== After Cleanup ==="
          df -h
          
      - name: Clone working ESP32-Deauther base
        run: |
          cd /tmp
          rm -rf ESP32-Deauther
          git clone --depth 1 https://github.com/tesa-klebeband/ESP32-Deauther
          ls -la /tmp/ESP32-Deauther/
          
      - name: Install PlatformIO
        run: |
          pip install --no-cache-dir platformio
          pio --version
          
      - name: Copy custom web files
        run: |
          mkdir -p /tmp/ESP32-Deauther/data/web
          cp -r /home/runner/work/deauther-v3/deauther-v3/data/web/* /tmp/ESP32-Deauther/data/web/
          ls -la /tmp/ESP32-Deauther/data/web/
          
      - name: Build ESP32 firmware
        run: |
          cd /tmp/ESP32-Deauther
          pio run -e esp32doit-devkit-v1 2>&1
          
      - name: List build files
        if: always()
        run: |
          cd /tmp/ESP32-Deauther
          ls -la .pio/build/esp32doit-devkit-v1/*.bin 2>/dev/null || echo "No bin files found"
          echo "=== Build directory contents ==="
          find .pio/build -type f 2>/dev/null | head -20
          
      - name: Create complete flash image
        id: create-flash
        run: |
          cd /tmp/ESP32-Deauther
          
          echo "=== Checking build directory ==="
          ls -la .pio/build/esp32doit-devkit-v1/
          
          if [ ! -f ".pio/build/esp32doit-devkit-v1/bootloader.bin" ]; then
              echo "ERROR: bootloader.bin not found!"
              exit 1
          fi
          
          python3 << 'EOF'
          import os
          
          build_dir = ".pio/build/esp32doit-devkit-v1"
          
          BOOTLOADER_ADDR = 0x1000
          PARTITIONS_ADDR = 0x8000
          APP_ADDR = 0x10000
          
          with open(f'{build_dir}/bootloader.bin', 'rb') as f:
              bootloader = f.read()
          
          with open(f'{build_dir}/partitions.bin', 'rb') as f:
              partitions = f.read()
          
          with open(f'{build_dir}/firmware.bin', 'rb') as f:
              firmware = f.read()
          
          with open('complete_flash_custom.bin', 'wb') as f:
              f.write(b'\xff' * BOOTLOADER_ADDR)
              f.write(bootloader)
              f.write(b'\xff' * (PARTITIONS_ADDR - (BOOTLOADER_ADDR + len(bootloader))))
              f.write(partitions)
              f.write(b'\xff' * (APP_ADDR - (PARTITIONS_ADDR + len(partitions))))
              f.write(firmware)
          
          print(f"Complete image: {len(bootloader) + len(partitions) + len(firmware)} bytes")
          print(f"File exists: {os.path.exists('complete_flash_custom.bin')}")
          print(f"File size: {os.path.getsize('complete_flash_custom.bin')}")
          EOF
          
          ls -la complete_flash_custom.bin
          pwd
          
      - name: Upload to Release
        if: success()
        run: |
          cd /tmp/ESP32-Deauther
          
          echo "=== Uploading complete_flash_custom.bin ==="
          RESPONSE=$(curl -s -X POST "https://uploads.github.com/repos/${{ github.repository }}/releases/308011086/assets?name=complete_flash_custom.bin" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @complete_flash_custom.bin)
          
          echo "$RESPONSE"
          
          echo "=== Uploading firmware.bin ==="
          RESPONSE2=$(curl -s -X POST "https://uploads.github.com/repos/${{ github.repository }}/releases/308011086/assets?name=firmware.bin" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @.pio/build/esp32doit-devkit-v1/firmware.bin)
          
          echo "$RESPONSE2"
