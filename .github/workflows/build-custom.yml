name: Build Custom Firmware

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-esp32:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Clean disk
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          
      - name: Install PlatformIO
        run: pip install --no-cache-dir platformio
          
      - name: Build ESP32 firmware
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3
          pio run -e esp32wroom 2>&1
          
      - name: Create complete flash image
        if: success()
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3
          
          python3 << 'EOF'
          BOOTLOADER_ADDR = 0x1000
          PARTITIONS_ADDR = 0x8000
          APP_ADDR = 0x10000
          
          with open('.pio/build/esp32wroom/bootloader.bin', 'rb') as f:
              bootloader = f.read()
          
          with open('.pio/build/esp32wroom/partitions.bin', 'rb') as f:
              partitions = f.read()
          
          with open('.pio/build/esp32wroom/firmware.bin', 'rb') as f:
              firmware = f.read()
          
          with open('complete_flash_custom.bin', 'wb') as f:
              f.write(b'\xff' * BOOTLOADER_ADDR)
              f.write(bootloader)
              f.write(b'\xff' * (PARTITIONS_ADDR - (BOOTLOADER_ADDR + len(bootloader))))
              f.write(partitions)
              f.write(b'\xff' * (APP_ADDR - (PARTITIONS_ADDR + len(partitions))))
              f.write(firmware)
          
          print(f"Complete image: {len(bootloader) + len(partitions) + len(firmware)} bytes")
          EOF
          
      - name: Upload to Release
        if: success()
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3
          
          RESPONSE=$(curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/releases/307981417/assets?name=complete_flash_custom_v2.bin" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @complete_flash_custom.bin)
          
          echo "$RESPONSE" | grep -o '"browser_download_url":"[^"]*"'
