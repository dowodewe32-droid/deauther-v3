name: Build GMpro87dev

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clean disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ESP32
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3
          pio run -e esp32wroom

      - name: Check build
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3
          ls -la .pio/build/esp32wroom/*.bin

      - name: Create flash
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3
          python3 create_flash.py

      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3
          curl -X POST "https://uploads.github.com/repos/dowodewe32-droid/deauther-v3/releases/308016127/assets?name=GMpro87dev_v1.0.bin" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @flash.bin
