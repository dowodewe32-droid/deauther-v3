name: Build GMpro87dev

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-4xlarge
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clean
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Clone TESA
        run: |
          cd /tmp
          rm -rf ESP32-Deauther
          git clone --depth 1 https://github.com/tesa-klebeband/ESP32-Deauther

      - name: Apply settings
        run: |
          sed -i 's/#define AP_SSID "ESP32-Deauther"/#define AP_SSID "GMpro"/g' /tmp/ESP32-Deauther/include/definitions.h
          sed -i 's/#define AP_PASS "esp32wroom32"/#define AP_PASS "Sangkur87"/g' /tmp/ESP32-Deauther/include/definitions.h
          sed -i 's/#define NUM_FRAMES_PER_DEAUTH 16/#define NUM_FRAMES_PER_DEAUTH 100/g' /tmp/ESP32-Deauther/include/definitions.h

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: |
          cd /tmp/ESP32-Deauther
          pio run -e esp32doit-devkit-v1

      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/ESP32-Deauther/.pio/build/esp32doit-devkit-v1/firmware.bin ]; then
            curl -X POST "https://uploads.github.com/repos/dowodewe32-droid/deauther-v3/releases/308016127/assets?name=GMpro87dev_v1.0.bin" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @/tmp/ESP32-Deauther/.pio/build/esp32doit-devkit-v1/firmware.bin | python3 -c "import json,sys; print(json.load(sys.stdin).get('browser_download_url','ERROR'))"
          fi
