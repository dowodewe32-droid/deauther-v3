name: Build GMpro87dev

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clean disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Clone TESA and Apply Changes
        run: |
          cd /tmp
          rm -rf ESP32-Deauther
          git clone --depth 1 https://github.com/tesa-klebeband/ESP32-Deauther
          sed -i 's/#define AP_SSID "ESP32-Deauther"/#define AP_SSID "GMpro"/g' ESP32-Deauther/include/definitions.h
          sed -i 's/#define AP_PASS "esp32wroom32"/#define AP_PASS "Sangkur87"/g' ESP32-Deauther/include/definitions.h
          sed -i 's/#define NUM_FRAMES_PER_DEAUTH 16/#define NUM_FRAMES_PER_DEAUTH 100/g' ESP32-Deauther/include/definitions.h
          cat ESP32-Deauther/include/definitions.h | grep -E "AP_SSID|AP_PASS|NUM_FRAMES"

      - name: Copy to workspace
        run: |
          cp -r /tmp/ESP32-Deauther /home/runner/work/deauther-v3/deauther-v3/ESP32_ONLY_TEST

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3/ESP32_ONLY_TEST
          pio run

      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /home/runner/work/deauther-v3/deauther-v3/ESP32_ONLY_TEST/.pio/build/esp32dev/firmware.bin ]; then
            curl -X POST "https://uploads.github.com/repos/dowodewe32-droid/deauther-v3/releases/308016127/assets?name=GMpro87dev_v1.0.bin" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @/home/runner/work/deauther-v3/deauther-v3/ESP32_ONLY_TEST/.pio/build/esp32dev/firmware.bin | python3 -c "import json,sys; print(json.load(sys.stdin).get('browser_download_url','ERROR'))"
          fi
