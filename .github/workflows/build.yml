name: Build GMpro87dev

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clean disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3/ESP32_ONLY_TEST
          pio run

      - name: Create flash
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3/ESP32_ONLY_TEST
          ls -la .pio/build/esp32dev/*.bin
          
      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /home/runner/work/deauther-v3/deauther-v3/ESP32_ONLY_TEST
          if [ -f .pio/build/esp32dev/firmware.bin ]; then
            curl -X POST "https://uploads.github.com/repos/dowodewe32-droid/deauther-v3/releases/308016127/assets?name=GMpro87dev_v1.0.bin" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @.pio/build/esp32dev/firmware.bin | python3 -c "import json,sys; print(json.load(sys.stdin).get('browser_download_url','ERROR'))"
          fi
