name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install platformio

      - run: pio run -e esp32doit-devkit-v1 --silent

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/esp32doit-devkit-v1/firmware.bin

      - uses: actions/upload-artifact@v4
        with:
          name: bootloader
          path: .pio/build/esp32doit-devkit-v1/bootloader.bin

      - uses: actions/upload-artifact@v4
        with:
          name: partitions
          path: .pio/build/esp32doit-devkit-v1/partitions.bin