name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build ESP32
        run: cd ${{ github.workspace }} && pio run -e esp32wroom
      - name: Package
        run: |
          cd ${{ github.workspace }}/.pio/build/esp32wroom
          python3 -c "B=0x1000;P=0x8000;A=0x10000;bl=open('bootloader.bin','rb').read();pt=open('partitions.bin','rb').read();fw=open('firmware.bin','rb').read();f=bytearray(A);f[B:B+len(bl)]=bl;f[P:P+len(pt)]=pt;f[A:A+len(fw)]=fw;open('${{ github.workspace }}/GMpro87dev_flash.bin','wb').write(f)"
      - uses: actions/upload-artifact@v4
        with:
          name: flash
          path: ${{ github.workspace }}/GMpro87dev_flash.bin
