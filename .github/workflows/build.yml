name: Build GMpro87dev

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /home/*/.cache
          docker system prune -af --volumes || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install PlatformIO
        run: pip install platformio
        
      - name: Build ESP32 Firmware
        run: |
          pio run -e esp32wroom
          
      - name: Create Flash Image
        run: |
          python3 ${{ github.workspace }}/create_flash.py
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            ${{ github.workspace }}/GMpro87dev_flash.bin
            ${{ github.workspace }}/.pio/build/esp32wroom/firmware.bin
