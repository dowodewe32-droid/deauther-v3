name: Build GMpro87dev

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Clean disk
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          
      - name: Clone TESA
        run: |
          cd /tmp
          rm -rf ESP32-Deauther
          git clone --depth 1 https://github.com/tesa-klebeband/ESP32-Deauther
          
      - name: Apply custom SSID
        run: |
          sed -i 's/#define AP_SSID "ESP32-Deauther"/#define AP_SSID "GMpro"/g' /tmp/ESP32-Deauther/include/definitions.h
          sed -i 's/#define AP_PASS "esp32wroom32"/#define AP_PASS "Sangkur87"/g' /tmp/ESP32-Deauther/include/definitions.h
          
      - name: Copy web UI
        run: |
          rm -rf /tmp/ESP32-Deauther/data
          cp -r /home/runner/work/deauther-v3/deauther-v3/data /tmp/ESP32-Deauther/
          
      - name: Install PlatformIO
        run: pip install --no-cache-dir platformio
          
      - name: Build
        run: |
          cd /tmp/ESP32-Deauther
          pio run -e esp32doit-devkit-v1
          
      - name: Create flash
        run: |
          cd /tmp/ESP32-Deauther
          python3 -c "
import os
BOOTLOADER_ADDR = 0x1000
PARTITIONS_ADDR = 0x8000
APP_ADDR = 0x10000
with open('.pio/build/esp32doit-devkit-v1/bootloader.bin', 'rb') as f:
    bootloader = f.read()
with open('.pio/build/esp32doit-devkit-v1/partitions.bin', 'rb') as f:
    partitions = f.read()
with open('.pio/build/esp32doit-devkit-v1/firmware.bin', 'rb') as f:
    firmware = f.read()
with open('GMpro87dev.bin', 'wb') as f:
    f.write(b'\xff' * BOOTLOADER_ADDR)
    f.write(bootloader)
    f.write(b'\xff' * (PARTITIONS_ADDR - (BOOTLOADER_ADDR + len(bootloader))))
    f.write(partitions)
    f.write(b'\xff' * (APP_ADDR - (PARTITIONS_ADDR + len(partitions))))
    f.write(firmware)
print('Done: ' + str(os.path.getsize('GMpro87dev.bin')))
"
          
      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/ESP32-Deauther
          curl -s -X POST "https://uploads.github.com/repos/dowodewe32-droid/deauther-v3/releases/308016127/assets?name=GMpro87dev_v1.0.bin" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @GMpro87dev.bin | python3 -c "import json,sys; print(json.load(sys.stdin).get('browser_download_url','ERROR'))"
