name: Build GMpro87dev

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone TESA
        run: |
          git clone --depth 1 https://github.com/tesa-klebeband/ESP32-Deauther

      - name: Apply settings
        run: |
          (Get-Content ESP32-Deauther/include/definitions.h) -replace 'AP_SSID "ESP32-Deauther"', 'AP_SSID "GMpro"' | Set-Content ESP32-Deauther/include/definitions.h
          (Get-Content ESP32-Deauther/include/definitions.h) -replace 'AP_PASS "esp32wroom32"', 'AP_PASS "Sangkur87"' | Set-Content ESP32-Deauther/include/definitions.h

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: |
          cd ESP32-Deauther
          pio run -e esp32doit-devkit-v1

      - name: Upload
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (Test-Path ESP32-Deauther/.pio/build/esp32doit-devkit-v1/firmware.bin) {
            curl.exe -X POST "https://uploads.github.com/repos/dowodewe32-droid/deauther-v3/releases/308016127/assets?name=GMpro87dev_v1.0.bin" -H "Authorization: token $env:GH_TOKEN" -H "Content-Type: application/octet-stream" --data-binary "@ESP32-Deauther\.pio\build\esp32doit-devkit-v1\firmware.bin"
          }
