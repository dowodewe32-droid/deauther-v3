name: Build GMpro87dev

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clean disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Clone repo
        run: |
          cd /tmp
          rm -rf ESP32-Deauther
          git clone --depth 1 https://github.com/tesa-klebeband/ESP32-Deauther
          ls -la ESP32-Deauther/

      - name: Change SSID
        run: |
          sed -i 's/#define AP_SSID "ESP32-Deauther"/#define AP_SSID "GMpro"/g' /tmp/ESP32-Deauther/include/definitions.h
          sed -i 's/#define AP_PASS "esp32wroom32"/#define AP_PASS "Sangkur87"/g' /tmp/ESP32-Deauther/include/definitions.h
          cat /tmp/ESP32-Deauther/include/definitions.h | grep AP_

      - name: Copy web files
        run: |
          mkdir -p /tmp/ESP32-Deauther/data
          cp -r /home/runner/work/deauther-v3/deauther-v3/data/* /tmp/ESP32-Deauther/data/
          ls /tmp/ESP32-Deauther/data/

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: |
          cd /tmp/ESP32-Deauther
          cp /home/runner/work/deauther-v3/deauther-v3/create_flash.py .
          pio run -e esp32doit-devkit-v1

      - name: Create flash
        run: |
          cd /tmp/ESP32-Deauther
          python3 create_flash.py

      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/ESP32-Deauther
          curl -X POST "https://uploads.github.com/repos/dowodewe32-droid/deauther-v3/releases/308016127/assets?name=GMpro87dev_v1.0.bin" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @flash.bin
