name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.11-slim
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install PlatformIO
        run: pip install platformio esptool
        
      - name: Build firmware
        run: |
          cd esp8266_deauther
          mv * ../ 2>/dev/null || true
          mv .* ../ 2>/dev/null || true
          cd ..
          rm -rf esp8266_deauther
          pio run -e nodemcuv2 --target buildfs || true
          pio run -e nodemcuv2
        
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/nodemcuv2/firmware.bin
