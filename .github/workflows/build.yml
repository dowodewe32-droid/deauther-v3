name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build-esp32-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Clean disk
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          
      - name: Install PlatformIO
        run: pip install --no-cache-dir platformio
          
      - name: Build ESP32 Only Test
        run: |
          cd ESP32_ONLY_TEST
          pio run 2>&1 | tail -20
          ls -la .pio/build/esp32dev/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware-esp32-only
          path: ESP32_ONLY_TEST/.pio/build/esp32dev/firmware.bin
