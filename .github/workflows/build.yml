name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build with Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace luid09/esp32-build:latest /bin/bash -c "cd /workspace && pio run -e nodemcuv2"
          
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware
          path: .pio/build/nodemcuv2/firmware.bin
