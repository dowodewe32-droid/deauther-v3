name: Build TESA Complete

on:
  workflow_dispatch:

jobs:
  build-tesa-complete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Clean disk
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          
      - name: Clone working ESP32-Deauther
        run: |
          cd /tmp
          rm -rf ESP32-Deauther
          git clone https://github.com/tesa-klebeband/ESP32-Deauther
          
      - name: Install PlatformIO
        run: pip install --no-cache-dir platformio
          
      - name: Build TESA firmware
        run: |
          cd /tmp/ESP32-Deauther
          pio run -e esp32doit-devkit-v1 2>&1
          
      - name: List build files
        run: |
          cd /tmp/ESP32-Deauther
          ls -la .pio/build/esp32doit-devkit-v1/
          echo "=== Contents ==="
          ls -la .pio/build/esp32doit-devkit-v1/*.bin
          ls -la .pio/build/esp32doit-devkit-v1/*.elf
          
      - name: Create complete flash image
        run: |
          cd /tmp/ESP32-Deauther
          BUILD_DIR=.pio/build/esp32doit-devkit-v1
          
          # Create complete flash image (bootloader + partitions + app)
          python3 << 'EOF'
          import struct
          
          # Flash addresses
          BOOTLOADER_ADDR = 0x1000
          PARTITIONS_ADDR = 0x8000
          APP_ADDR = 0x10000
          
          with open('.pio/build/esp32doit-devkit-v1/bootloader.bin', 'rb') as f:
              bootloader = f.read()
          
          with open('.pio/build/esp32doit-devkit-v1/partitions.bin', 'rb') as f:
              partitions = f.read()
          
          with open('.pio/build/esp32doit-devkit-v1/firmware.bin', 'rb') as f:
              firmware = f.read()
          
          # Create combined image
          with open('complete_flash.bin', 'wb') as f:
              # Pad to 0x1000, write bootloader
              f.write(b'\xff' * BOOTLOADER_ADDR)
              f.write(bootloader)
              
              # Pad to 0x8000, write partitions
              f.write(b'\xff' * (PARTITIONS_ADDR - (BOOTLOADER_ADDR + len(bootloader))))
              f.write(partitions)
              
              # Write app at 0x10000
              f.write(b'\xff' * (APP_ADDR - (PARTITIONS_ADDR + len(partitions))))
              f.write(firmware)
          
          print(f"Bootloader: {len(bootloader)} bytes")
          print(f"Partitions: {len(partitions)} bytes")
          print(f"Firmware: {len(firmware)} bytes")
          print(f"Complete image created")
          EOF
          
          ls -la complete_flash.bin
          
      - name: Upload complete flash
        uses: actions/upload-artifact@v4
        with:
          name: tesa-complete-flash
          path: /tmp/ESP32-Deauther/complete_flash.bin
          
      - name: Upload all bins
        uses: actions/upload-artifact@v4
        with:
          name: tesa-all-files
          path: /tmp/ESP32-Deauther/.pio/build/esp32doit-devkit-v1/*.bin
